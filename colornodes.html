    <svg id="colorCanvas"></svg>
    <button id="nextTrackBtn" class="btn btn-primary px-4 py-2">next</button>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function averageColors(hexColors) {
        const rgbs = hexColors.map(hex => ({
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        }));
        const avg = {
            r: Math.round(rgbs.reduce((sum, c) => sum + c.r, 0) / rgbs.length),
            g: Math.round(rgbs.reduce((sum, c) => sum + c.g, 0) / rgbs.length),
            b: Math.round(rgbs.reduce((sum, c) => sum + c.b, 0) / rgbs.length)
        };
        return `#${avg.r.toString(16).padStart(2,'0')}${avg.g.toString(16).padStart(2,'0')}${avg.b.toString(16).padStart(2,'0')}`;
    }

    document.addEventListener("DOMContentLoaded", async function() {
        const trackTitle = sessionStorage.getItem("trackTitle");
        const submittedColor = sessionStorage.getItem("submittedColor");
        const nextIndex = sessionStorage.getItem("nextIndex");
        const playOrder = JSON.parse(sessionStorage.getItem("playOrder") || "[]");
        const nextBtn = document.getElementById("nextTrackBtn");
        const svg = d3.select("#colorCanvas");

        // get canvas dimensions
setTimeout(async () => {
    const sidebarW = window.innerWidth > 991 ? 160 : 0;
    const topbarH = window.innerWidth <= 991 ? 56 : 0;
    const W = window.innerWidth;
    const H = window.innerHeight;
    const centerX = sidebarW + (W - sidebarW) / 2;
    const centerY = topbarH + (H - topbarH) / 2;

    svg.attr("width", W).attr("height", H);

    console.log("W:", W, "H:", H, "centerX:", centerX, "centerY:", centerY);

    // fetch prior colors
    let colors = [];

        try {
            const response = await fetch("/.netlify/functions/get-colors?track=" + encodeURIComponent(trackTitle));
            const data = await response.json();
            if (data.colors && data.colors.length > 0) {
                colors = data.colors;
            }
        } catch (err) {
            console.error("Failed to fetch colors:", err);
        }

        // add submitted color
        if (submittedColor) colors.push(submittedColor);

        // calculate average
        const avgColor = colors.length > 0 ? averageColors(colors) : "#ffffff";
        const concat= "[" + avgColor + "]";

        const outerRadius = Math.max(20, Math.min(50, W / (colors.length * 1.5)));

        const nodes = colors.map((color, i) => ({
            color,
            r: outerRadius,
            isAverage: false,
            x: centerX + (Math.random() - 0.5) * W * 0.8,
            y: centerY + (Math.random() - 0.5) * H * 0.8
        }));

        // central average node
        nodes.push({
            color: avgColor,
            r: outerRadius * 2,
            isAverage: true,
            x: centerX,
            y: centerY,
            fx: centerX, // fixed position
            fy: centerY
        });

        // draw circles
        const circles = svg.selectAll("circle")
            .data(nodes)
            .enter()
            .append("circle")
            .attr("r", d => d.r)
            .attr("fill", d => d.color)
            .attr("stroke", d => d.isAverage ? "#6c757d" : "none")
            .attr("stroke-width", d => d.isAverage ? .5 : 0)
            .attr("opacity", d => d.isAverage ? 1 : 0.85);

        const avgNode = nodes[nodes.length - 1];
        const textEl = svg.append("text")
            .attr("text-anchor", "middle")
            .attr("fill", "#ffffff")
            .attr("font-size", "0.7rem")
            .attr("font-family", "Atkinson Hyperlegible Mono, monospace")
            .attr("pointer-events", "none")
            .attr("x", avgNode.fx)
            .attr("y", avgNode.fy);

        textEl.append("tspan")
            .attr("x", avgNode.fx)
            .attr("dy", "-0.6em")
            .text("averaged");

        textEl.append("tspan")
            .attr("x", avgNode.fx)
            .attr("dy", "1.4em")
            .text(avgColor);

        // D3 force simulation
        const simulation = d3.forceSimulation(nodes)
            .alphaDecay(0.02)  // slower decay = more time to spread out
            .force("center", d3.forceCenter(centerX, centerY).strength(0.8))
            .force("collide", d3.forceCollide(d => d.r + 75).strength(1))
            .force("charge", d3.forceManyBody().strength(-100))
            .force("x", d3.forceX(centerX).strength(0.05))
            .force("y", d3.forceY(centerY).strength(0.05))
            .on("tick", () => {
                circles
                    .attr("cx", d => Math.max(d.r, Math.min(W - d.r, d.x)))
                    .attr("cy", d => Math.max(d.r, Math.min(H - d.r, d.y)));
            });


        // next button
        nextBtn.addEventListener("click", function() {
            sessionStorage.setItem("startIndex", nextIndex);
            sessionStorage.setItem("playOrder", JSON.stringify(playOrder));
            window.location.href = "VoiceColor.html";
        });
        }, 200);
    });
    </script>
</body>
