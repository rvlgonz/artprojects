    try {

if (!response.ok) throw new Error(`HTTP ${response.status}`);
const data = await response.json();

buildCarousel(referents);

const firstSvg = document.querySelector(".carousel-item.active .colorCanvas");
if (firstSvg) {
    firstSvg.dataset.drawn = "true";
    await drawTrack(firstSvg);
}

const carouselEl = document.getElementById("trackCarousel");
carouselEl.addEventListener("slid.bs.carousel", async (e) => {
    const svg = e.relatedTarget.querySelector(".colorCanvas");
    if (svg && !svg.dataset.drawn) {

function buildCarousel(referents) {

    const indicators = document.querySelector(".carousel-indicators");
    const inner = document.querySelector(".carousel-inner");

    indicators.innerHTML = "";
    inner.innerHTML = "";

    referents.forEach((track, index) => {

        //
        // ----- Indicator -----
        //

        const indicator = document.createElement("button");

        indicator.type = "button";
        indicator.dataset.bsTarget = "#trackCarousel";
        indicator.dataset.bsSlideTo = index;
        indicator.setAttribute("aria-label", `Slide ${index + 1}`);

        if (index === 0) {
            indicator.classList.add("active");
            indicator.setAttribute("aria-current", "true");
        }

        indicators.appendChild(indicator);

        //
        // ----- Slide -----
        //

        const slide = document.createElement("div");

        slide.className = "carousel-item";

        if (index === 0)
            slide.classList.add("active");

        //
        // Create SVG
        //

        const svg = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg"
        );

        svg.classList.add("colorCanvas");
        svg.dataset.track = track;
        //
        // Caption
        //

        const caption = document.createElement("div");
        caption.className =
            "carousel-caption row justify-content-md-center";

        const title = document.createElement("h6");

        title.textContent = track;

        title.style.fontFamily =
            "'Atkinson Hyperlegible Mono', monospace";
        title.style.color = "#ee4343";

        caption.appendChild(title);

        slide.appendChild(svg);
        slide.appendChild(caption);

        inner.appendChild(slide);

    });

}

        function averageColors(hexColors) {
        const rgbs = hexColors.map(hex => ({
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        }));
        const avg = {
            r: Math.round(rgbs.reduce((sum, c) => sum + c.r, 0) / rgbs.length),
            g: Math.round(rgbs.reduce((sum, c) => sum + c.g, 0) / rgbs.length),
            b: Math.round(rgbs.reduce((sum, c) => sum + c.b, 0) / rgbs.length)
        };
        return `#${avg.r.toString(16).padStart(2,'0')}${avg.g.toString(16).padStart(2,'0')}${avg.b.toString(16).padStart(2,'0')}`;
    }

    async function fetchColors(track) {

    let colors = [];

    try {

        const response = await fetch(
            "/.netlify/functions/get-colors?track=" + encodeURIComponent(track)
        );

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (Array.isArray(data.colors)) {
            colors = data.colors;
        }

    }
    catch (err) {

        console.error(
            `Failed to fetch colors for "${track}":`,
            err
        );

    }

    return colors;

}


    async function drawTrack(svgElement) {
        const track = svgElement.dataset.track;

        const colors = await fetchColors(track);

        const submittedColor = sessionStorage.getItem("submittedColor");

        if (submittedColor) {
            colors.push(submittedColor);
        }

        const svg = d3.select(svgElement);
        svg.selectAll("*").remove();
        const rect = svgElement.getBoundingClientRect();
        const reservedBottom = window.innerWidth <= 991 ? 110 : 40;
        const W = rect.width;
        const H = rect.height;
        const leftBias = 16;   // px to favor the left; tune to taste
        const centerX = W / 2 - leftBias;
        const centerY = (H - reservedBottom) / 2;

        svg.attr("viewBox", `0 0 ${W} ${H}`)
        .attr("preserveAspectRatio", "xMidYMid meet");
        
        const avgColor = colors.length > 0 ? averageColors(colors) : "#ffffff";

        const outerRadius = Math.max(20, Math.min(50, W / (colors.length * 1.5)));

        const nodes = colors.map((color, i) => ({
            color,
            r: outerRadius,
            isAverage: false,
            x: centerX + (Math.random() - 0.5) * W * 0.8,
            y: centerY + (Math.random() - 0.5) * H * 0.8
        }));

        // central average node
        nodes.push({
            color: avgColor,
            r: outerRadius * 2,
            isAverage: true,
            x: centerX,
            y: centerY,
            fx: centerX, // fixed position
            fy: centerY
        });

        const avgNode = nodes[nodes.length - 1];

                // draw circles
        const circles = svg.selectAll("circle")
            .data(nodes)
            .enter()
            .append("circle")
            .attr("r", d => d.r)
            .attr("fill", d => d.color)
            .attr("stroke", d => d.isAverage ? "#6c757d" : "none")
            .attr("stroke-width", d => d.isAverage ? .5 : 0)
            .attr("opacity", d => d.isAverage ? 1 : 0.85);

        const textEl = svg.append("text")
            .attr("text-anchor", "middle")
            .attr("fill", "#ffffff")
            .attr("font-size", "0.7rem")
            .attr("font-family", "Atkinson Hyperlegible Mono, monospace")
            .attr("pointer-events", "none")
            .attr("x", avgNode.fx)
            .attr("y", avgNode.fy);

        textEl.append("tspan")
            .attr("x", avgNode.fx)
            .attr("dy", "-0.6em")
            .text("averaged");

        textEl.append("tspan")
            .attr("x", avgNode.fx)
            .attr("dy", "1.4em")
            .text(avgColor);



        // D3 force simulation
        const simulation = d3.forceSimulation(nodes)
            .alphaDecay(0.02)  // slower decay = more time to spread out
            .force("center", d3.forceCenter(centerX, centerY).strength(0.8))
            .force("collide", d3.forceCollide(d => d.r + 20).strength(1))
            .force("charge", d3.forceManyBody().strength(-100))
            .force("x", d3.forceX(centerX).strength(0.05))
            .force("y", d3.forceY(centerY).strength(0.05))
            .on("tick", () => {
                circles
                    .attr("cx", d => Math.max(d.r, Math.min(W - d.r, d.x)))
                    .attr("cy", d => Math.max(d.r, Math.min(H - reservedBottom - d.r, d.y)));
            });

 

}
